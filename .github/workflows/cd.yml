name: 🚀 CD — SwiftClaim Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────
  # Pre-Deploy Gate: Test Backend & Frontend
  # ─────────────────────────────────────────────────
  pre-deploy-gate:
    name: 🔒 Pre-Deploy Gate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 📦 Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: 🔍 Lint backend
        working-directory: backend
        run: flake8 app.py damage_detector.py parts_database.py payout_calculator.py severity_estimator.py --max-line-length=120 --extend-ignore=E203,W503,E221 --count --statistics

      - name: 🧪 Test backend
        working-directory: backend
        run: python -m pytest test_detector.py -v --tb=short

      - name: 🟢 Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: 📦 Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: 🏗️ Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:5001

  # ─────────────────────────────────────────────────
  # Build & Upload Artifacts
  # ─────────────────────────────────────────────────
  deploy:
    name: 📦 Build & Upload Artifacts
    needs: pre-deploy-gate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🟢 Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: 📦 Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:5001

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/dist
          retention-days: 30

      - name: ✅ Deployment Successful
        run: echo "✅ Build completed successfully and artifacts uploaded"
