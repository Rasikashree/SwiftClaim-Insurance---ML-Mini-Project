name: 🚀 CD — SwiftClaim Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────
  # Pre-deploy checks
  # ─────────────────────────────────────────────────
  pre-deploy-check:
    name: 🔒 Pre-Deploy Gate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install backend deps
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: 🧪 Run backend tests
        working-directory: backend
        run: python -m pytest test_detector.py -v --tb=short

      - name: 🟢 Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:5001' }}

  # ─────────────────────────────────────────────────
  # Deploy Frontend to GitHub Pages
  # ─────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → GitHub Pages
    needs: pre-deploy-check
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🟢 Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build for production
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:5001' }}

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/

      - name: 🚀 Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────
  # Create Release (optional)
  # ─────────────────────────────────────────────────
  create-release:
    name: 🏷️ Create Release
    needs: deploy-frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 📋 Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:"%h - %s" -n 5)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📌 Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Changes in this Release
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
