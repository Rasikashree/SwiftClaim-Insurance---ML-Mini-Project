name: 🚀 CD — SwiftClaim Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────
  # Ensure CI passed before deploying
  # ─────────────────────────────────────────────────
  pre-deploy-check:
    name: 🔒 Pre-deploy Gate
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install backend deps
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: 🧪 Smoke-test backend
        working-directory: backend
        run: python -m pytest test_detector.py -v --tb=short -q

      - name: 🟢 Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:5001' }}

  # ─────────────────────────────────────────────────
  # Deploy Frontend to GitHub Pages
  # ─────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → GitHub Pages
    needs: pre-deploy-check
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🟢 Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🏗️ Build for production
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:5001' }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─────────────────────────────────────────────────
  # Create GitHub Release on main push
  # ─────────────────────────────────────────────────
  create-release:
    name: 🏷️ Create Release
    needs: deploy-frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📝 Generate release notes
        id: notes
        run: |
          # Get short SHA and date for the release tag
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y.%m.%d)
          echo "tag=v${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=SwiftClaim ${DATE} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: 📝 Write release notes
        run: |
          COMMIT_MESSAGE="$(git log -1 --pretty=%B)"
          cat > release-notes.md <<EOF
          ## 🚀 SwiftClaim Automated Release

          Commit: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          Triggered by: @${{ github.actor }}

          ### What's included
          - ✅ Backend tests passed
          - ✅ Frontend build successful
          - ✅ Frontend deployed to GitHub Pages

          ### Changes
          ${COMMIT_MESSAGE}
          EOF

      - name: 🚀 Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.notes.outputs.tag }}" \
            --title "${{ steps.notes.outputs.name }}" \
            --notes-file release-notes.md
