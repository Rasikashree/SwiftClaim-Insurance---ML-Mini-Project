name: 🔬 CI — SwiftClaim

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────
  # Backend: Lint & Test
  # ─────────────────────────────────────────────────
  backend:
    name: 🐍 Backend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: 🔍 Check syntax errors
        working-directory: backend
        run: flake8 app.py damage_detector.py parts_database.py payout_calculator.py severity_estimator.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 🔍 Full lint check
        working-directory: backend
        run: flake8 app.py damage_detector.py parts_database.py payout_calculator.py severity_estimator.py --count --max-line-length=120 --extend-ignore=E203,W503,E221 --statistics

      - name: 🧪 Run tests
        working-directory: backend
        run: python -m pytest test_detector.py -v --tb=short

  # ─────────────────────────────────────────────────
  # Frontend: Lint & Build
  # ─────────────────────────────────────────────────
  frontend:
    name: ⚛️ Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🟢 Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔍 Lint
        working-directory: frontend
        run: npm run lint

      - name: 🏗️ Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:5001' }}

  # ─────────────────────────────────────────────────
  # Integration Gate
  # ─────────────────────────────────────────────────
  gate:
    name: ✅ Integration Gate
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 🔎 Check all jobs passed
        run: |
          if [[ "${{ needs.backend.result }}" != "success" || "${{ needs.frontend.result }}" != "success" ]]; then
            echo "❌ CI failed"
            echo "Backend: ${{ needs.backend.result }}"
            echo "Frontend: ${{ needs.frontend.result }}"
            exit 1
          fi
          echo "✅ All checks passed!"
