name: 🔬 CI — SwiftClaim

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main", "develop"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────
  # JOB 1: Backend — Lint & Test
  # ─────────────────────────────────────────────────
  backend-ci:
    name: 🐍 Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: 🔍 Lint with flake8
        run: |
          # Stop on syntax errors or undefined names first
          flake8 app.py damage_detector.py parts_database.py payout_calculator.py severity_estimator.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Full lint with relaxed rules for the shipped backend modules
          flake8 app.py damage_detector.py parts_database.py payout_calculator.py severity_estimator.py --count --max-line-length=120 \
                 --extend-ignore=E203,W503,E221,E401,W291,W293 \
                 --exclude=__pycache__,uploads,part_images,generate_part_images.py,test_*.py \
                 --statistics

      - name: 🧪 Run unit tests
        run: |
          python -m pytest test_detector.py -v \
            --tb=short \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --ignore=test_e2e.py

      - name: 📊 Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ github.sha }}
          path: backend/coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────────
  # JOB 2: Frontend — Lint & Build
  # ─────────────────────────────────────────────────
  frontend-ci:
    name: ⚛️ Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🟢 Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint with ESLint
        run: npm run lint

      - name: 🏗️ Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:5001' }}

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────
  # JOB 3: Integration Gate (requires both to pass)
  # ─────────────────────────────────────────────────
  integration-gate:
    name: ✅ Integration Gate
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 🔎 Check all jobs passed
        run: |
          if [[ "${{ needs.backend-ci.result }}" != "success" || \
                "${{ needs.frontend-ci.result }}" != "success" ]]; then
            echo "❌ One or more CI jobs failed."
            exit 1
          fi
          echo "✅ All CI checks passed — ready to merge!"
