# ─── SwiftClaim — Docker Compose ───────────────────────────────────
# Runs the Flask backend + React/Nginx frontend as a single stack.
#
# Usage:
#   docker compose up --build          # first run / after code changes
#   docker compose up -d               # detached (background)
#   docker compose down                # stop and remove containers
#   docker compose logs -f backend     # stream backend logs
# ───────────────────────────────────────────────────────────────────

services:

  # ── Backend: Flask API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swiftclaim-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      # Persist the SQLite database across container restarts
      - backend-db:/app/parts_prices.db
      # Persist part images (generated at startup)
      - backend-parts:/app/part_images
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend: React + Nginx ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Points the frontend at the backend; override with your server's IP if needed
        VITE_API_BASE_URL: http://localhost:5001
    container_name: swiftclaim-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Named volumes for persistence
volumes:
  backend-db:
  backend-parts:
